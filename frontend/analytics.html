<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FocusGuard Analytics</title>

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav>
    <h1>📊 FocusGuard Analytics</h1>
</nav>

<div class="container">

    <div class="card">
        <h2>Weekly Focus Score</h2>
        <canvas id="focusChart"></canvas>
    </div>

    <div class="card">
        <h2>Study Streak</h2>
        <h1 id="streak">🔥 0 Days</h1>
    </div>

    <div class="card">
        <h2>AI Productivity Insights</h2>
        <ul id="insights"></ul>
    </div>

    <div class="card">
        <h2>Achievement Badges</h2>
        <div id="badges"></div>
    </div>

</div>

<script src="js/analytics.js"></script>

</body>
</html>
